<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>النبأ العظيم - إدارة الحلقات القرآنية</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- ===== تنسيقات إضافية لقائمة الملفات داخل البطاقة ===== -->
  <style>
    /* قائمة الملفات المرفوعة داخل البطاقة */
    .files-list {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 0.78rem;
      color: var(--text-primary);
      animation: fadeUp 0.3s ease;
    }

    .file-item span { opacity: 0.7; font-size: 0.72rem; }

    .file-remove {
      background: none;
      border: none;
      color: #f78c8c;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85rem;
      min-width: unset;
      transition: background 0.2s;
    }
    .file-remove:hover { background: rgba(224,82,82,0.2); }

    /* زر دمج المنطقة */
    .btn-region-merge {
      width: 100%;
      margin-top: 10px;
      padding: 9px;
      background: rgba(201,168,76,0.12);
      color: var(--gold-light);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      transition: all 0.2s;
      display: none; /* يظهر فقط عند رفع أكثر من ملف */
    }
    .btn-region-merge:hover {
      background: rgba(201,168,76,0.22);
      transform: translateY(-1px);
    }

    /* شارة عدد الملفات */
    .files-badge {
      display: inline-block;
      background: rgba(201,168,76,0.2);
      color: var(--gold-light);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 12px;
      padding: 1px 9px;
      font-size: 0.72rem;
      font-weight: 700;
      margin-right: 6px;
    }
  </style>
</head>
<body>

  <div class="bg-pattern"></div>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <!-- ===== الهيدر ===== -->
  <header>
    <div class="header-inner">
      <div class="logo-section">
        <img src="logo.png" alt="شعار النبأ العظيم" class="logo-img" />
        <div class="logo-text">
          <h1>مؤسسة النبأ العظيم</h1>
          <p>منظومة إدارة الحلقات القرآنية</p>
        </div>
      </div>
      <div class="header-badge">
        <span class="badge-dot"></span>
        النظام نشط
      </div>
    </div>
    <div class="header-ornament">
      <svg viewBox="0 0 1200 30" preserveAspectRatio="none">
        <path d="M0,15 Q150,0 300,15 Q450,30 600,15 Q750,0 900,15 Q1050,30 1200,15 L1200,30 L0,30 Z" fill="rgba(255,255,255,0.06)"/>
        <path d="M0,20 Q150,5 300,20 Q450,35 600,20 Q750,5 900,20 Q1050,35 1200,20 L1200,30 L0,30 Z" fill="rgba(255,255,255,0.04)"/>
      </svg>
    </div>
  </header>

  <!-- ===== المحتوى ===== -->
  <main>

    <!-- شريط الإحصائيات -->
    <div class="stats-strip">
      <div class="stat-item">
        <span class="stat-icon">📂</span>
        <div>
          <span class="stat-value" id="uploaded-count">0</span>
          <span class="stat-label">مناطق مرفوعة</span>
        </div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-icon">🗂️</span>
        <div>
          <span class="stat-value" id="total-files">0</span>
          <span class="stat-label">إجمالي الملفات</span>
        </div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-icon">👤</span>
        <div>
          <span class="stat-value" id="total-records">0</span>
          <span class="stat-label">إجمالي السجلات</span>
        </div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-icon">✅</span>
        <div>
          <span class="stat-value" id="status-label">جاهز</span>
          <span class="stat-label">حالة النظام</span>
        </div>
      </div>
    </div>

    <!-- رأس القسم -->
    <div class="section-header">
      <div class="section-title">
        <span class="ornament-left">❧</span>
        تقارير المناطق السبع
        <span class="ornament-right">❧</span>
      </div>
      <p class="section-subtitle">يمكنك رفع أكثر من ملف لكل منطقة — سيتم دمجها تلقائياً</p>
    </div>

    <!-- بطاقات المناطق -->
    <div class="regions-grid" id="regions-grid">
      <!-- تُولَّد من app.js -->
    </div>

    <!-- أزرار التحكم الرئيسية -->
    <div class="actions-bar">
      <button id="merge-btn" class="btn-primary" onclick="mergeAllAndExport()" disabled>
        <span class="btn-icon">⬇️</span>
        <span>دمج كل المناطق وتصدير</span>
      </button>
      <button id="preview-btn" class="btn-secondary" onclick="togglePreview()" style="display:none">
        <span class="btn-icon">👁️</span>
        <span>معاينة البيانات</span>
      </button>
      <button id="reset-btn" class="btn-danger" onclick="resetAll()">
        <span class="btn-icon">🔄</span>
        <span>إعادة تعيين</span>
      </button>
    </div>

    <!-- جدول المعاينة -->
    <div id="preview-section" class="preview-card" style="display:none">
      <div class="preview-header">
        <h2>📊 معاينة البيانات المدمجة</h2>
        <span id="preview-count" class="preview-badge"></span>
      </div>
      <div id="preview-table-container"></div>
    </div>

  </main>

  <footer>
    <div class="footer-ornament">﷽</div>
    <p>مؤسسة النبأ العظيم © <span id="year"></span> — جميع الحقوق محفوظة</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
